name: Build OOP COBOL with Otterkit CLI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Otterkit templates
        run: dotnet new install Otterkit.Templates::1.7.50

      - name: Install Otterkit CLI
        run: dotnet tool install --global Otterkit --version 1.0.80

      - name: Add dotnet tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Verify Otterkit
        run: |
          otterkit --version
          dotnet --info

      - name: Create OOP COBOL source file if missing
        run: |
          mkdir -p src
          if [ ! -f src/HELLO.cob ]; then
            printf '%s\n' \
              '       IDENTIFICATION DIVISION.' \
              '       CLASS-ID. HELLO.' \
              '' \
              '       METHOD-ID. MAIN.' \
              '       PROCEDURE DIVISION.' \
              '           DISPLAY "HELLO FROM OOP COBOL WITH OTTERKIT".' \
              '           GOBACK.' \
              '       END METHOD MAIN.' \
              '' \
              '       END CLASS HELLO.' > src/HELLO.cob
          fi
          ls -la src
          echo "===== HELLO.cob ====="
          cat src/HELLO.cob

      - name: Create build folder
        run: |
          rm -rf build-app
          mkdir -p build-app

      - name: Copy COBOL source into build folder
        run: |
          cp src/HELLO.cob build-app/main.cob
          ls -la build-app
          echo "===== main.cob ====="
          cat build-app/main.cob

      - name: Prepare Otterkit export project (Linux CI fix)
        working-directory: build-app
        run: |
          mkdir -p .otterkit/OtterkitExport

          cat > .otterkit/OtterkitExport/OtterkitExport.csproj <<'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net8.0</TargetFramework>
              <ImplicitUsings>enable</ImplicitUsings>
              <Nullable>enable</Nullable>
              <SelfContained>false</SelfContained>
            </PropertyGroup>

            <ItemGroup>
              <PackageReference Include="Otterkit.Runtime" Version="1.0.80" />
            </ItemGroup>
          </Project>
          EOF

          echo "===== CHECK EXPORT PROJECT ====="
          ls -la .otterkit/OtterkitExport
          cat .otterkit/OtterkitExport/OtterkitExport.csproj

      - name: Show generated C# before build
        if: always()
        working-directory: build-app
        run: |
          echo "===== GENERATED FILES BEFORE BUILD ====="
          find .otterkit -maxdepth 4 -type f | sort || true
          if [ -f .otterkit/OtterkitExport/HELLO.cs ]; then
            echo "===== HELLO.cs ====="
            sed -n '1,200p' .otterkit/OtterkitExport/HELLO.cs
          fi
          if [ -f .otterkit/OtterkitExport/Startup.cs ]; then
            echo "===== Startup.cs ====="
            sed -n '1,200p' .otterkit/OtterkitExport/Startup.cs
          fi

      - name: Build COBOL project
        working-directory: build-app
        run: otterkit build -e main.cob --free

      - name: Show generated files
        if: always()
        run: |
          echo "===== BUILD-APP TREE ====="
          find build-app -maxdepth 8 -type f | sort || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: otterkit-build-output
          path: |
            build-app/**