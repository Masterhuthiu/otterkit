# otterkit-oop.yml

name: Build Multi-File COBOL OOP with Otterkit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-otterkit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Show .NET info
        run: |
          dotnet --info
          dotnet --list-sdks
          dotnet --list-runtimes

      - name: Install Otterkit templates (latest)
        run: |
          dotnet new install Otterkit.Templates::1.7.50

      - name: Install Otterkit tool
        run: |
          dotnet tool install --global Otterkit.Tool --version 1.7.50 || \
          dotnet tool update --global Otterkit.Tool --version 1.7.50

          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Verify Otterkit
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          otterkit --help || true

      # Tạo workspace build sạch
      - name: Prepare build workspace
        run: |
          rm -rf build-app
          mkdir -p build-app/src

      # Copy toàn bộ source tree nhiều file OOP
      - name: Copy all COBOL OOP sources
        run: |
          cp -R src/* build-app/src/

          # File entry chính cho OOP project
          echo "ENTRY_FILE=src/Main.cob" >> $GITHUB_ENV

          echo "===== build-app/src tree ====="
          find build-app/src -type f -print

          echo "===== ENTRY FILE ====="
          echo "src/Main.cob"

          echo "===== Main.cob content ====="
          cat build-app/src/Main.cob

      # (Tuỳ chọn) tạo app skeleton nếu bạn muốn thử cho Otterkit có thêm context
      # Nhưng KHÔNG dùng output của template vì trước đó bạn bị lỗi build-app không sinh như mong muốn
      - name: Create Otterkit project metadata (best effort)
        continue-on-error: true
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"

          # Thử tạo ở thư mục tạm riêng để không phá build-app của mình
          rm -rf temp-otterkit-app
          otterkit new app temp-otterkit-app || true

          echo "===== temp-otterkit-app (if any) ====="
          find temp-otterkit-app -maxdepth 3 -type f 2>/dev/null || true

      # Build / transpile từ COBOL -> C#
      - name: Transpile multi-file OOP COBOL with Otterkit
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"

          cd build-app

          echo "Using entry file: $ENTRY_FILE"
          echo "===== build-app tree before transpile ====="
          find . -type f -print

          # Chạy transpile
          otterkit build -e "$ENTRY_FILE" --free || true

          echo "===== build-app tree after transpile ====="
          find . -type f -print

      # Debug xem Otterkit sinh ra gì
      - name: Inspect generated files
        run: |
          echo "===== GENERATED FILES ====="
          find build-app -type f -print || true

          echo "===== .otterkit folder ====="
          find build-app/.otterkit -type f -print 2>/dev/null || true

          echo "===== Search for generated C# ====="
          find build-app -type f -name "*.cs" -print 2>/dev/null || true

      # In nội dung các file C# nếu có
      - name: Show generated C# files
        run: |
          CSFILES=$(find build-app -type f -name "*.cs" 2>/dev/null || true)

          if [ -n "$CSFILES" ]; then
            for f in $CSFILES; do
              echo "===== FILE: $f ====="
              sed -n '1,220p' "$f"
              echo
            done
          else
            echo "No generated .cs files found."
          fi

      # Kiểm tra csproj có sinh ra không
      - name: Check generated project files
        run: |
          echo "===== Search for .csproj ====="
          find build-app -type f -name "*.csproj" -print 2>/dev/null || true

          echo "===== Search for OtterkitLibrary refs ====="
          grep -R "OtterkitLibrary" build-app/.otterkit 2>/dev/null || true

      # Nén output để tải về phân tích
      - name: Package build output
        run: |
          cd build-app
          zip -r ../otterkit-build-output.zip . || true
          cd ..

          ls -lah otterkit-build-output.zip || true

      - name: Upload transpiled output artifact
        uses: actions/upload-artifact@v4
        with:
          name: otterkit-build-output
          path: otterkit-build-output.zip