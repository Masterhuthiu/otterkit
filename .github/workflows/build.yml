name: Build Otterkit Compiler + COBOL

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Inspect repository
        run: |
          echo "===== CURRENT DIR ====="
          pwd
          echo "===== ROOT FILES ====="
          ls -la
          echo "===== FIND PROJECT FILES ====="
          find . -type f \( -name "*.csproj" -o -name "*.sln" \) | sort

      - name: Auto-detect project file
        id: detect
        run: |
          PROJECT=$(find . -type f -name "*.csproj" | head -n 1)
          if [ -z "$PROJECT" ]; then
            echo "No .csproj found!"
            exit 1
          fi
          echo "Found project: $PROJECT"
          echo "project=$PROJECT" >> $GITHUB_OUTPUT

      - name: Restore compiler
        run: dotnet restore "${{ steps.detect.outputs.project }}"

      - name: Build compiler
        run: dotnet build "${{ steps.detect.outputs.project }}" -c Release --no-restore

      - name: Create test COBOL file
        run: |
          mkdir -p examples
          cat > examples/HELLO.cob <<'EOF'
               IDENTIFICATION DIVISION.
               PROGRAM-ID. HELLO.

               PROCEDURE DIVISION.
                   DISPLAY "HELLO FROM OTTERKIT ON GITHUB ACTIONS".
                   STOP RUN.
          EOF

      - name: Prepare Otterkit folders
        run: |
          mkdir -p .otterkit/OtterkitExport
          ls -la .otterkit/OtterkitExport

      - name: Run compiler with COBOL file
        run: dotnet run --project "${{ steps.detect.outputs.project }}" -- build -e examples/HELLO.cob --free

      - name: Show generated files
        if: always()
        run: |
          echo "===== GENERATED FILES ====="
          find . -maxdepth 6 -type f | sort

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: otterkit-output
          path: |
            .otterkit/**
            examples/**
            **/bin/**
            **/obj/**