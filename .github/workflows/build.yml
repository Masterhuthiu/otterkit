name: Build OOP COBOL with Otterkit CLI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verify installed runtimes
        run: |
          dotnet --info
          dotnet --list-sdks
          dotnet --list-runtimes

      - name: Install Otterkit templates
        run: dotnet new install Otterkit.Templates::1.7.50

      - name: Install Otterkit CLI
        run: dotnet tool install --global Otterkit --version 1.0.80

      - name: Add dotnet tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Verify Otterkit
        run: |
          which otterkit || true
          otterkit --version

      - name: Create OOP COBOL source if missing
        run: |
          mkdir -p src
          if [ ! -f src/HELLO.cob ]; then
            printf '%s\n' \
              '       IDENTIFICATION DIVISION.' \
              '       CLASS-ID. HELLO.' \
              '' \
              '       METHOD-ID. MAIN.' \
              '       PROCEDURE DIVISION.' \
              '           DISPLAY "HELLO FROM OOP COBOL WITH OTTERKIT".' \
              '           GOBACK.' \
              '       END METHOD MAIN.' \
              '' \
              '       END CLASS HELLO.' > src/HELLO.cob
          fi
          echo "===== src ====="
          ls -la src
          cat src/HELLO.cob

      - name: Create Otterkit app skeleton
        run: |
          rm -rf build-app
          otterkit new app build-app
          echo "===== build-app tree after otterkit new app ====="
          find build-app -maxdepth 4 -type f | sort || true

      - name: Replace default COBOL source with our file
        run: |
          # tìm file .cob đầu tiên trong skeleton
          COBFILE=$(find build-app -type f \( -name "*.cob" -o -name "*.cbl" \) | head -n 1)
          echo "Found skeleton COBOL file: $COBFILE"

          if [ -n "$COBFILE" ]; then
            cp src/HELLO.cob "$COBFILE"
          else
            # fallback nếu template không có file sẵn
            mkdir -p build-app/src
            cp src/HELLO.cob build-app/src/HELLO.cob
            COBFILE="src/HELLO.cob"
          fi

          echo "ENTRY_FILE=$COBFILE" >> $GITHUB_ENV

          echo "===== final COBOL file ====="
          cat "build-app/$COBFILE" 2>/dev/null || cat "$COBFILE"

      - name: Show build-app layout before build
        run: |
          echo "===== build-app layout ====="
          find build-app -maxdepth 6 -type f | sort || true

      - name: Build with Otterkit
        run: |
          cd build-app
          echo "Using entry file: ${ENTRY_FILE#build-app/}"
          # normalize path if it already starts with build-app/
          ENTRY="${ENTRY_FILE#build-app/}"
          otterkit build -e "$ENTRY" --free

      - name: Show generated files after build
        if: always()
        run: |
          echo "===== build-app tree ====="
          find build-app -maxdepth 8 -type f | sort || true

          echo "===== search for OtterkitLibrary references ====="
          grep -R "using OtterkitLibrary" -n build-app || true

          if [ -f build-app/.otterkit/OtterkitExport/HELLO.cs ]; then
            echo "===== HELLO.cs ====="
            sed -n '1,200p' build-app/.otterkit/OtterkitExport/HELLO.cs
          fi

          if [ -f build-app/.otterkit/OtterkitExport/Startup.cs ]; then
            echo "===== Startup.cs ====="
            sed -n '1,200p' build-app/.otterkit/OtterkitExport/Startup.cs
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: otterkit-build-output
          path: |
            build-app/**